<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMBERFORGE — GPU VFX Studio</title>
<style>
:root{
  --bg:#0b0c10; --panel:#13151c; --panel2:#181b24; --line:#232733;
  --txt:#cdd3e1; --dim:#6b7387; --acc:#ff7a18; --acc2:#ffb347;
  --blue:#3aa0ff; --rad:8px;
}
*{box-sizing:border-box; user-select:none; -webkit-user-select:none;}
html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);
  font-family:"Segoe UI",Inter,system-ui,sans-serif;font-size:12px;}
#app{display:grid;grid-template-rows:44px 1fr 64px;grid-template-columns:46px 1fr 292px;height:100%;}
/* ---------- top bar ---------- */
#topbar{grid-column:1/4;display:flex;align-items:center;gap:10px;padding:0 12px;
  background:linear-gradient(180deg,#171a23,#11131a);border-bottom:1px solid var(--line);}
#logo{font-weight:800;font-size:14px;letter-spacing:2px;color:#fff;white-space:nowrap;}
#logo span{color:var(--acc);}
#presets{display:flex;gap:6px;overflow-x:auto;flex:1;padding:4px 2px;scrollbar-width:thin;}
.preset{flex:0 0 auto;padding:5px 11px;border-radius:14px;background:var(--panel2);
  border:1px solid var(--line);cursor:pointer;font-size:11px;font-weight:600;color:var(--dim);
  transition:all .15s;white-space:nowrap;}
.preset:hover{color:#fff;border-color:var(--acc);}
.preset.active{background:linear-gradient(135deg,#ff7a18,#ff3d68);color:#fff;border-color:transparent;}
.tbtn{padding:6px 10px;border-radius:6px;background:var(--panel2);border:1px solid var(--line);
  color:var(--txt);cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;}
.tbtn:hover{border-color:var(--acc);color:#fff;}
/* ---------- left toolbar ---------- */
#toolbar{grid-row:2/3;grid-column:1/2;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 0;
  background:var(--panel);border-right:1px solid var(--line);}
.tool{width:34px;height:34px;display:flex;align-items:center;justify-content:center;border-radius:7px;
  cursor:pointer;color:var(--dim);font-size:15px;border:1px solid transparent;}
.tool:hover{color:#fff;background:var(--panel2);}
.tool.active{color:var(--acc);background:var(--panel2);border-color:var(--acc);}
.tool svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
#toolbar hr{width:24px;border:none;border-top:1px solid var(--line);margin:4px 0;}
/* ---------- viewport ---------- */
#viewport{grid-row:2/3;grid-column:2/3;position:relative;overflow:hidden;background:#000;}
#viewport.checker{background:
  repeating-conic-gradient(#2a2d36 0 25%, #1c1f26 0 50%) 0 0/24px 24px;}
#viewport.white{background:#e8e8ea;}
#glcanvas,#overlay{position:absolute;inset:0;width:100%;height:100%;}
#overlay{cursor:crosshair;}
#hud{position:absolute;top:10px;left:12px;font-size:11px;color:#8d96ad;pointer-events:none;
  text-shadow:0 1px 3px #000;line-height:1.7;}
#hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;color:#9aa3b8;
  background:rgba(10,11,16,.75);padding:5px 14px;border-radius:14px;pointer-events:none;
  border:1px solid var(--line);backdrop-filter:blur(4px);white-space:nowrap;}
#seamview{position:absolute;top:10px;right:12px;display:none;border:1px solid var(--acc);
  border-radius:6px;overflow:hidden;}
/* ---------- right panel ---------- */
#panel{grid-row:2/3;grid-column:3/4;overflow-y:auto;background:var(--panel);border-left:1px solid var(--line);
  scrollbar-width:thin;scrollbar-color:#2a2e3a transparent;}
.group{border-bottom:1px solid var(--line);}
.ghead{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;cursor:pointer;
  font-weight:700;font-size:11px;letter-spacing:1.2px;color:#aeb6c8;text-transform:uppercase;}
.ghead:hover{color:#fff;background:var(--panel2);}
.ghead .arr{transition:transform .15s;font-size:9px;color:var(--dim);}
.group.closed .arr{transform:rotate(-90deg);}
.group.closed .gbody{display:none;}
.gbody{padding:2px 13px 12px;}
.row{display:flex;align-items:center;gap:8px;margin:7px 0;}
.row label{flex:0 0 86px;color:var(--dim);font-size:11px;}
.row input[type=range]{flex:1;appearance:none;height:4px;border-radius:2px;background:#262b38;outline:none;}
.row input[type=range]::-webkit-slider-thumb{appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--acc);cursor:pointer;border:2px solid #0b0c10;box-shadow:0 0 6px rgba(255,122,24,.5);}
.row .val{flex:0 0 44px;text-align:right;color:#e7ecf6;font-size:11px;font-variant-numeric:tabular-nums;}
.row select,.row input[type=number]{flex:1;background:var(--panel2);border:1px solid var(--line);
  color:var(--txt);border-radius:5px;padding:4px 6px;font-size:11px;outline:none;}
.row input[type=checkbox]{accent-color:var(--acc);}
#gradbar{width:100%;height:26px;border-radius:5px;border:1px solid var(--line);cursor:copy;display:block;}
#gradstops{position:relative;height:16px;margin-top:2px;}
.stop{position:absolute;top:0;width:12px;height:14px;transform:translateX(-6px);cursor:ew-resize;
  border:2px solid #fff;border-radius:3px;box-shadow:0 0 0 1px #000;}
.stop.sel{border-color:var(--acc);}
.btnrow{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.btn{flex:1;padding:7px 4px;border-radius:6px;border:1px solid var(--line);background:var(--panel2);
  color:var(--txt);cursor:pointer;font-size:11px;font-weight:600;text-align:center;min-width:80px;}
.btn:hover{border-color:var(--acc);color:#fff;}
.btn.primary{background:linear-gradient(135deg,#ff7a18,#ff3d68);border:none;color:#fff;}
.btn.primary:hover{filter:brightness(1.15);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
#exprog{display:none;margin-top:8px;}
#exprogbar{height:6px;border-radius:3px;background:#262b38;overflow:hidden;}
#exprogfill{height:100%;width:0%;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .1s;}
#exprogtxt{font-size:10px;color:var(--dim);margin-top:3px;}
/* ---------- bottom timeline ---------- */
#timeline{grid-column:1/4;display:flex;align-items:center;gap:10px;padding:0 14px;
  background:var(--panel);border-top:1px solid var(--line);}
#playbtn{width:36px;height:36px;border-radius:50%;border:none;cursor:pointer;font-size:14px;
  background:linear-gradient(135deg,#ff7a18,#ff3d68);color:#fff;}
#scrub{flex:1;height:30px;cursor:pointer;border-radius:6px;}
.tl{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--dim);white-space:nowrap;}
.tl input[type=number]{width:54px;background:var(--panel2);border:1px solid var(--line);color:#fff;
  border-radius:5px;padding:4px;font-size:11px;}
.tl select{background:var(--panel2);border:1px solid var(--line);color:#fff;border-radius:5px;padding:4px;font-size:11px;}
.tl input[type=checkbox]{accent-color:var(--acc);width:14px;height:14px;}
#timecode{font-variant-numeric:tabular-nums;color:#fff;font-weight:600;min-width:86px;}
.modechip{padding:5px 12px;border-radius:14px;border:1px solid var(--line);cursor:pointer;font-weight:700;font-size:11px;color:var(--dim);}
.modechip.active{color:#fff;background:var(--blue);border-color:transparent;}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div id="logo">EMBER<span>FORGE</span></div>
    <div id="presets"></div>
    <button class="tbtn" id="luckybtn">🎲 I'm feeling lucky</button>
    <button class="tbtn" id="mode2d">2D</button>
    <button class="tbtn" id="mode3d">3D</button>
  </div>
  <div id="toolbar"></div>
  <div id="viewport" class="checker">
    <canvas id="glcanvas"></canvas>
    <canvas id="overlay"></canvas>
    <div id="hud"></div>
    <div id="hint">draw a shape — it becomes the emitter ✦</div>
    <canvas id="seamview" width="180" height="120"></canvas>
  </div>
  <div id="panel"></div>
  <div id="timeline">
    <button id="playbtn">❚❚</button>
    <canvas id="scrub" height="30"></canvas>
    <div id="timecode">0.000 / 4.000</div>
    <div class="tl"><input type="checkbox" id="loopchk" checked><label for="loopchk">Perfect&nbsp;Loop</label></div>
    <div class="tl">dur <input type="number" id="loopdur" value="4.0" min="0.5" max="10" step="0.5">s</div>
    <div class="tl">fps <select id="fpssel"><option>24</option><option selected>30</option><option>60</option></select></div>
    <div class="tl">res <select id="ressel">
      <option value="512x512">512²</option><option value="1024x1024" selected>1024²</option>
      <option value="2048x2048">2048²</option><option value="1920x1080">1920×1080</option>
      <option value="3840x2160">3840×2160</option><option value="1080x1920">1080×1920</option></select></div>
    <div class="tl">bg <select id="bgsel"><option value="checker" selected>alpha</option>
      <option value="black">black</option><option value="white">white</option></select></div>
    <div class="tl"><input type="checkbox" id="seamchk"><label for="seamchk">seam&nbsp;check</label></div>
  </div>
</div>
<script>
/* ============================================================
   EMBERFORGE V2 — GPU VFX Studio
   Layer-based authoring. Stateless GPU particles + beam renderer:
   every pixel is a pure function of (seed, time) -> deterministic,
   scrubbable, perfectly loopable.
   ============================================================ */
'use strict';

const NOISE_GLSL = `
vec3 mod289(vec3 x){return x - floor(x*(1.0/289.0))*289.0;}
vec4 mod289(vec4 x){return x - floor(x*(1.0/289.0))*289.0;}
vec4 permute(vec4 x){return mod289(((x*34.0)+1.0)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159 - 0.85373472095314*r;}
float snoise(vec3 v){
  const vec2 C = vec2(1.0/6.0, 1.0/3.0);
  const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
  vec3 i  = floor(v + dot(v, C.yyy));
  vec3 x0 = v - i + dot(i, C.xxx);
  vec3 g = step(x0.yzx, x0.xyz);
  vec3 l = 1.0 - g;
  vec3 i1 = min(g.xyz, l.zxy);
  vec3 i2 = max(g.xyz, l.zxy);
  vec3 x1 = x0 - i1 + C.xxx;
  vec3 x2 = x0 - i2 + C.yyy;
  vec3 x3 = x0 - D.yyy;
  i = mod289(i);
  vec4 p = permute(permute(permute(i.z + vec4(0.0, i1.z, i2.z, 1.0))
        + i.y + vec4(0.0, i1.y, i2.y, 1.0)) + i.x + vec4(0.0, i1.x, i2.x, 1.0));
  float n_ = 0.142857142857;
  vec3 ns = n_ * D.wyz - D.xzx;
  vec4 j = p - 49.0*floor(p*ns.z*ns.z);
  vec4 x_ = floor(j*ns.z);
  vec4 y_ = floor(j - 7.0*x_);
  vec4 x = x_*ns.x + ns.yyyy;
  vec4 y = y_*ns.x + ns.yyyy;
  vec4 h = 1.0 - abs(x) - abs(y);
  vec4 b0 = vec4(x.xy, y.xy);
  vec4 b1 = vec4(x.zw, y.zw);
  vec4 s0 = floor(b0)*2.0 + 1.0;
  vec4 s1 = floor(b1)*2.0 + 1.0;
  vec4 sh = -step(h, vec4(0.0));
  vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
  vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
  vec3 p0 = vec3(a0.xy, h.x);
  vec3 p1 = vec3(a0.zw, h.y);
  vec3 p2 = vec3(a1.xy, h.z);
  vec3 p3 = vec3(a1.zw, h.w);
  vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));
  p0 *= norm.x; p1 *= norm.y; p2 *= norm.z; p3 *= norm.w;
  vec4 m = max(0.6 - vec4(dot(x0,x0), dot(x1,x1), dot(x2,x2), dot(x3,x3)), 0.0);
  m = m*m;
  return 42.0 * dot(m*m, vec4(dot(p0,x0), dot(p1,x1), dot(p2,x2), dot(p3,x3)));
}
float hash11(float p){p = fract(p*0.1031); p *= p+33.33; p *= p+p; return fract(p);}
vec4 hash41(float p){
  vec4 p4 = fract(vec4(p)*vec4(0.1031,0.1030,0.0973,0.1099));
  p4 += dot(p4, p4.wzxy+33.33);
  return fract((p4.xxyz+p4.yzzw)*p4.zywx);
}
vec2 flowOff(float uTime, float uLoopDur, float uFlow, bool uLoop, float mult){
  if(uLoop){
    float a = 6.28318530718 * (uTime/uLoopDur);
    return vec2(cos(a), sin(a)) * uFlow * mult;
  }
  return vec2(uTime*uFlow*0.6*mult, uTime*uFlow*0.43*mult);
}
`;

const PARTICLE_VS = `#version 300 es
precision highp float;
${NOISE_GLSL}
uniform sampler2D uSpawnTex;   /* W x 2 RGBA32F : row0 pos.xyz | row1 emitdir.xyz */
uniform sampler2D uGradTex;
uniform int   uSpawnN;
uniform float uTime, uLoopDur, uSeed;
uniform bool  uLoop;
uniform float uLife, uSpeed, uSpeedVar, uSpread, uPathFollow, uDepth3D;
uniform float uGravity, uWindX, uWindY, uDrag, uVortex;
uniform float uCurlScale, uCurlStr, uFlow, uTurbScale, uTurbStr, uOctaves;
uniform float uSize, uSize0, uSize1, uStretch, uOpacity, uFadeIn, uFadeOut;
uniform int   uSegs;
uniform float uTrailTime, uTrailWidth;
uniform int   uHeadMode;       /* 1 = trail: emission travels along the path */
uniform float uHeadSpeed, uHeadWindow;
uniform mat4  uViewProj;
uniform vec3  uCamRight, uCamUp, uCamFwd;
uniform float uPixSize;
out vec4 vColor;
out vec2 vUv;
out float vHot;

vec2 curl2(vec2 p, float mult){
  vec2 fo = flowOff(uTime, uLoopDur, uFlow, uLoop, mult);
  float e = 0.07;
  vec3 q  = vec3(p*uCurlScale + fo, uSeed*7.7 + mult*13.1);
  float nx = snoise(q + vec3(e,0,0)) - snoise(q - vec3(e,0,0));
  float ny = snoise(q + vec3(0,e,0)) - snoise(q - vec3(0,e,0));
  return vec2(ny, -nx) / (2.0*e) * 0.25;
}
vec3 turb(vec3 p){
  vec2 fo = flowOff(uTime, uLoopDur, uFlow, uLoop, 1.7);
  vec3 d = vec3(0.0);
  float amp = 1.0, freq = uTurbScale;
  for(int i=0;i<4;i++){
    if(float(i) >= uOctaves) break;
    vec3 q = vec3(p.xy*freq + fo, p.z*freq + uSeed*3.3 + float(i)*17.0);
    d += amp * vec3(snoise(q), snoise(q+vec3(31.4,47.2,12.9)), snoise(q+vec3(11.7,84.1,55.5))*0.5);
    amp *= 0.5; freq *= 2.05;
  }
  return d;
}

vec3 particlePos(float fid, float t, out float ageN, out float prand){
  float h0 = hash11(fid*0.123 + uSeed);
  float tt = t + h0*uLife;
  float cyc = floor(tt/uLife);
  if(uLoop){
    float k = max(1.0, floor(uLoopDur/uLife + 0.5));
    cyc = mod(cyc, k);
  }
  float age = tt - floor(tt/uLife)*uLife;
  ageN = age/uLife;
  vec4 rnd  = hash41(fid*1.618 + cyc*7919.0 + uSeed*101.0);
  vec4 rnd2 = hash41(fid*2.347 + cyc*4663.0 + uSeed*57.0);
  prand = rnd.w;
  /* spawn index: random along shape, or travelling head (trail mode) */
  float sIdx;
  if(uHeadMode == 1){
    float headT;
    if(uLoop){
      float cycles = max(1.0, floor(abs(uHeadSpeed)*uLoopDur + 0.5)) * sign(uHeadSpeed);
      headT = fract(uTime/uLoopDur*cycles + 64.0);
    } else headT = fract(uTime*uHeadSpeed + 64.0);
    sIdx = fract(headT - rnd.x*uHeadWindow + 1.0);
  } else sIdx = rnd.x;
  int idx = int(sIdx*float(uSpawnN-1));
  vec3 spawn = texelFetch(uSpawnTex, ivec2(idx,0), 0).xyz;
  vec3 edir  = texelFetch(uSpawnTex, ivec2(idx,1), 0).xyz;
  spawn.z += (rnd2.w-0.5)*uDepth3D;
  /* emission direction: blend emit dir with random unit by spread */
  vec3 ru = normalize(rnd2.xyz - 0.5 + 1e-5);
  float s = clamp(uSpread/180.0, 0.0, 1.0);
  vec3 dir = normalize(mix(edir, ru, s) + 1e-5);
  /* path-follow: swirl along tangent */
  vec3 tang = normalize(cross(vec3(0.0,0.0,1.0), edir) + 1e-5);
  dir = normalize(mix(dir, tang, clamp(uPathFollow,0.0,1.0)));
  float spd = uSpeed * mix(1.0-uSpeedVar, 1.0, rnd.z);
  vec3 v0 = dir*spd;
  float kdrag = max(uDrag, 1e-4);
  float ik = (1.0-exp(-kdrag*age))/kdrag;
  vec3 p = spawn + v0*ik + vec3(uWindX, uWindY, 0.0)*age
         + vec3(0.0, -uGravity, 0.0)*0.5*age*age;
  if(abs(uVortex) > 0.001){
    float w = uVortex*age;
    float cw = cos(w), sw = sin(w);
    p.xy = vec2(p.x*cw - p.y*sw, p.x*sw + p.y*cw);
  }
  vec2 c = curl2(p.xy, 1.0) + 0.45*curl2(p.xy*2.3 + 5.0, 2.0);
  p.xy += c * uCurlStr * ik;
  p += turb(p) * uTurbStr * (0.15 + 0.85*ageN);
  return p;
}

void main(){
  int segs = uSegs;
  int pid  = gl_InstanceID / segs;
  int seg  = gl_InstanceID - pid*segs;
  float fid = float(pid);
  vec2 corner = vec2(float(gl_VertexID & 1), float((gl_VertexID >> 1) & 1));
  float ageN, prand;
  float segDt = (segs > 1) ? (uTrailTime/float(segs)) : 0.016;
  float t0 = uTime - float(seg)*segDt;
  float t1 = t0 - segDt;
  vec3 pA = particlePos(fid, t1, ageN, prand);
  float ageN0, pr0;
  vec3 pB = particlePos(fid, t0, ageN0, pr0);
  ageN = ageN0;
  float segFrac = float(seg)/float(max(segs-1,1));
  vec3 axis = pB - pA;
  float alen = length(axis);
  if(alen < 1e-6){ axis = vec3(uCamRight.xy*0.001, 0.0); alen = 0.001; }
  vec3 adir = axis/alen;
  float szLife = mix(uSize0, uSize1, ageN);
  float size = max(uSize*szLife, uPixSize*1.2);
  float fade = smoothstep(0.0, max(uFadeIn,0.001), ageN)
             * (1.0 - smoothstep(1.0-max(uFadeOut,0.001), 1.0, ageN));
  float taper = (segs>1) ? (1.0 - segFrac*0.85) : 1.0;
  float halfW = size*0.5*((segs>1)? uTrailWidth : 1.0)*taper;
  float stretchLen = (segs>1) ? alen : max(alen*uStretch*30.0*uSize, 0.0);
  vec3 across = normalize(cross(adir, uCamFwd) + 1e-6);
  vec3 wpos = mix(pA - adir*size*0.5, pB + adir*(size*0.5 + stretchLen), corner.x)
            + across*halfW*(corner.y*2.0-1.0);
  gl_Position = uViewProj * vec4(wpos, 1.0);
  vUv = corner;
  vec3 col = texture(uGradTex, vec2(ageN, 0.5)).rgb;
  float a = uOpacity * fade * (0.6 + 0.4*prand);
  if(segs>1) a *= (1.0 - segFrac*0.8);
  vColor = vec4(col, a);
  vHot = prand;
}
`;

const PARTICLE_FS = `#version 300 es
precision highp float;
in vec4 vColor;
in vec2 vUv;
in float vHot;
uniform float uSoft, uHot, uPosterize, uAlphaCut;
uniform int uBlendMode;
out vec4 frag;
void main(){
  vec2 p = vUv*2.0 - 1.0;
  float d2 = dot(p,p);
  if(d2 > 1.0) discard;
  float core = exp(-d2 * (2.0 + uSoft*8.0));
  float hot  = exp(-d2 * 24.0) * uHot * (0.5 + vHot);
  float a = vColor.a * core;
  vec3 col = vColor.rgb * (core + hot) + vec3(hot)*0.6;
  /* cartoon / stylized */
  if(uAlphaCut > 0.001){
    float edge = smoothstep(uAlphaCut, uAlphaCut + 0.06, a);
    a = edge * vColor.a;
    col = vColor.rgb * (0.85 + hot*0.6);
  }
  if(uPosterize > 0.5){
    col = floor(col*uPosterize + 0.5)/uPosterize;
    if(uAlphaCut <= 0.001) a = floor(a*uPosterize + 0.5)/uPosterize;
  }
  if(a <= 0.001) discard;
  if(uBlendMode == 0) frag = vec4(col * a, a);
  else frag = vec4(col * a, a);
}
`;

const BEAM_VS = `#version 300 es
precision highp float;
${NOISE_GLSL}
uniform sampler2D uSpawnTex;
uniform int   uSpawnN;
uniform float uTime, uLoopDur, uSeed;
uniform bool  uLoop;
uniform float uBeamWidth, uBeamNoiseAmp, uBeamNoiseScale, uBeamFlow, uTaper;
uniform mat4  uViewProj;
uniform vec3  uCamFwd;
out float vS;       /* 0..1 along beam */
out float vQ;       /* -1..1 across beam */
void main(){
  int seg = gl_InstanceID;
  vec2 corner = vec2(float(gl_VertexID & 1), float((gl_VertexID >> 1) & 1));
  int i0 = seg, i1 = seg + 1;
  vec3 p0 = texelFetch(uSpawnTex, ivec2(i0,0), 0).xyz;
  vec3 p1 = texelFetch(uSpawnTex, ivec2(i1,0), 0).xyz;
  float s0 = float(i0)/float(uSpawnN-1);
  float s1 = float(i1)/float(uSpawnN-1);
  float s = mix(s0, s1, corner.x);

const BEAM_FS = `#version 300 es

in float vS;
in float vQ;
uniform sampler2D uGradTex;
uniform float uTime, uLoopDur, uSeed;
uniform bool uLoop;
uniform float uBeamCore, uBeamGlow, uOpacity, uBeamScroll, uBeamFlicker;
uniform float uPosterize, uAlphaCut;

function updateGradTex(l){
  l = l || L();
  const W = 256, data = new Float32Array(W*4);
  const stops = [...l.grad].sort((a,b)=>a.t-b.t);
  for(let x=0;x<W;x++){
    const t = x/(W-1);
    let s0 = stops[0], s1 = stops[stops.length-1];
    for(let i=0;i<stops.length-1;i++){
      if(t >= stops[i].t && t <= stops[i+1].t){ s0 = stops[i]; s1 = stops[i+1]; break; }
    }
    const f = (s1.t > s0.t) ? (t - s0.t)/(s1.t - s0.t) : 0;
    const sm = f*f*(3-2*f);
    for(let c=0;c<3;c++) data[x*4+c] = (s0.c[c]*s0.i*(1-sm) + s1.c[c]*s1.i*sm);

  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, W, 1, 0, gl.RGBA, gl.FLOAT, data);

function resamplePath(pts, closed, step){
  const out = [];

  for(let i=1;i<P2.length;i++){
    const cur = P2[i];
    let dx = cur.x-prev.x, dy = cur.y-prev.y;
    let d = Math.hypot(dx,dy);
    while(acc + d >= step){
      const f = (step-acc)/d;
      prev = {x: prev.x+dx*f, y: prev.y+dy*f};
      out.push({...prev});
      dx = cur.x-prev.x; dy = cur.y-prev.y; d = Math.hypot(dx,dy); acc = 0;
    }

  if(l.emitShape === 'point'){
    for(let i=0;i<64;i++) pts.push({p:[0,0,0], d:[0,1,0]});
  } else if(l.emitShape === 'fountain'){
    for(let i=0;i<64;i++) pts.push({p:[0,-0.4,0], d:[0,1,0]});

function renderFrame(time, targetFBO, w, h, forExport){
  const c = computeCamera(w/h);
  gl.bindFramebuffer(gl.FRAMEBUFFER, RT.scene.fbo);
  gl.viewport(0,0,RT.w,RT.h);
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  if(MODE3D && !forExport){
    gl.blendFuncSeparate(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA, gl.ONE, gl.ONE_MINUS_SRC_ALPHA);
    gl.useProgram(progGrid.p);
    gl.uniformMatrix4fv(progGrid.u.uViewProj, false, c.vp);
    gl.bindVertexArray(gridVAO);
    gl.drawArrays(gl.LINES, 0, gridCount);
  }
  gl.bindVertexArray(emptyVAO);
  gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);   /* premultiplied over */
  for(const l of layers){
    if(!l.visible) continue;
    if(l.type === 'beam') drawBeamLayer(l, time, c);
    else drawParticleLayer(l, time, c);
  }
  gl.bindVertexArray(null);
  gl.disable(gl.BLEND);

  /* bloom */
  const m0 = RT.mips[0];
  gl.useProgram(progThresh.p);
  gl.bindFramebuffer(gl.FRAMEBUFFER, m0.fbo);
  gl.viewport(0,0,m0.w,m0.h);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, RT.scene.tex);
  gl.uniform1i(progThresh.u.uTex, 0); gl.uniform1f(progThresh.u.uThr, G.bloomThr);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.useProgram(progDown.p);
  for(let i=1;i<RT.mips.length;i++){
    const src = RT.mips[i-1], dst = RT.mips[i];
    gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
    gl.viewport(0,0,dst.w,dst.h);
    gl.bindTexture(gl.TEXTURE_2D, src.tex);
    gl.uniform1i(progDown.u.uTex, 0);
    gl.uniform2f(progDown.u.uTexel, 1/src.w, 1/src.h);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  gl.useProgram(progUp.p);
  gl.enable(gl.BLEND); gl.blendFunc(gl.ONE, gl.ONE);
  for(let i=RT.mips.length-1;i>0;i--){
    const src = RT.mips[i], dst = RT.mips[i-1];
    gl.bindFramebuffer(gl.FRAMEBUFFER, dst.fbo);
    gl.viewport(0,0,dst.w,dst.h);
    gl.bindTexture(gl.TEXTURE_2D, src.tex);
    gl.uniform1i(progUp.u.uTex, 0);
    gl.uniform2f(progUp.u.uTexel, 1/src.w, 1/src.h);
    gl.uniform1f(progUp.u.uRad, G.bloomRad);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  gl.disable(gl.BLEND);

  /* composite */
  gl.bindFramebuffer(gl.FRAMEBUFFER, targetFBO);
  gl.viewport(0,0,w,h);
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.useProgram(progComp.p);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, RT.scene.tex); gl.uniform1i(progComp.u.uScene, 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, RT.mips[0].tex); gl.uniform1i(progComp.u.uBloom, 1);
  gl.uniform1f(progComp.u.uBloomInt, G.bloomInt);
  gl.uniform1f(progComp.u.uChroma, G.chroma);
  gl.uniform1f(progComp.u.uGrain, G.grain);
  gl.uniform1f(progComp.u.uVig, G.vig);
  gl.uniform1f(progComp.u.uExposure, G.exposure);
  gl.uniform1f(progComp.u.uSat, G.sat);
  gl.uniform1f(progComp.u.uTime, T.loop ? 0.0 : time);
  gl.uniform2f(progComp.u.uRes, w, h);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

/* ---------- coordinate mapping ---------- */
function toWorld(e){
  const r = overlay.getBoundingClientRect();
  const aspect = r.width / r.height;
  const x = ((e.clientX - r.left)/r.width*2 - 1) * aspect;
  const y = -((e.clientY - r.top)/r.height*2 - 1);
  return {x, y};
}
function toScreen(p){
  const r = overlay.getBoundingClientRect();
  const aspect = r.width / r.height;
  return { x: (p.x/aspect+1)/2*overlay.width, y: (1-p.y)/2*overlay.height };
}

/* ---------- drawing interactions ---------- */
let drawing = false, curPts = [], penPts = [], dragPt = null, camDrag = null;
overlay.addEventListener('pointerdown', e => {
  overlay.setPointerCapture(e.pointerId);
  if(MODE3D){ camDrag = {x: e.clientX, y: e.clientY}; return; }
  const w = toWorld(e);
  if(tool === 'draw'){ drawing = true; curPts = [w]; }
  else if(tool === 'pen'){
    if(penPts.length > 2){
      const s = toScreen(penPts[0]), m = toScreen(w);
      if(Math.hypot(s.x-m.x, s.y-m.y) < 14){ finishPen(true); return; }
    }
    penPts.push(w); drawOverlay();
  }
  else if(tool === 'edit'){
    let best = null, bd = 0.05;
    paths.forEach((p,pi) => p.pts.forEach((pt,i) => {
      const d = Math.hypot(pt.x-w.x, pt.y-w.y);
      if(d < bd){ bd = d; best = {pi, i}; }
    }));
    dragPt = best;
  }
  else if(tool === 'erase'){
    let best = -1, bd = 0.08;
    paths.forEach((p,pi) => p.pts.forEach(pt => {
      const d = Math.hypot(pt.x-w.x, pt.y-w.y);
      if(d < bd){ bd = d; best = pi; }
    }));
    if(best >= 0){ paths.splice(best,1); rebuildDrawLayers(); drawOverlay(); }
  }
  else if(tool === 'circle' || tool === 'star' || tool === 'line'){
    drawing = true; curPts = [w, w];
  }
});
overlay.addEventListener('pointermove', e => {
  if(camDrag){
    cam.yaw   += (e.clientX - camDrag.x)*0.008;
    cam.pitch = Math.max(-1.4, Math.min(1.4, cam.pitch + (e.clientY - camDrag.y)*0.008));
    camDrag = {x: e.clientX, y: e.clientY};
    return;
  }
  const w = toWorld(e);
  if(drawing && tool === 'draw'){
    const last = curPts[curPts.length-1];
    if(Math.hypot(w.x-last.x, w.y-last.y) > 0.012) curPts.push(w);
    drawOverlay();
  } else if(drawing){ curPts[1] = w; drawOverlay(); }
  else if(dragPt){
    paths[dragPt.pi].pts[dragPt.i] = w;
    rebuildDrawLayers(); drawOverlay();
  } else if(tool === 'pen' && penPts.length){ drawOverlay(w); }
});
overlay.addEventListener('pointerup', e => {
  camDrag = null;
  if(dragPt){ dragPt = null; return; }
  if(!drawing) return;
  drawing = false;
  if(tool === 'draw' && curPts.length > 2){
    const closed = Math.hypot(curPts[0].x-curPts[curPts.length-1].x, curPts[0].y-curPts[curPts.length-1].y) < 0.07;
    paths.push({pts: simplify(curPts, 0.006), closed});
  } else if(tool === 'circle'){
    const r = Math.hypot(curPts[1].x-curPts[0].x, curPts[1].y-curPts[0].y) || 0.3;
    const pts = []; for(let i=0;i<48;i++){ const a = i/48*Math.PI*2; pts.push({x:curPts[0].x+Math.cos(a)*r, y:curPts[0].y+Math.sin(a)*r}); }
    paths.push({pts, closed:true});
  } else if(tool === 'star'){
    const r = Math.hypot(curPts[1].x-curPts[0].x, curPts[1].y-curPts[0].y) || 0.35;
    const pts = []; for(let i=0;i<10;i++){ const a = i/10*Math.PI*2 - Math.PI/2; const rr = i%2 ? r*0.45 : r;
      pts.push({x:curPts[0].x+Math.cos(a)*rr, y:curPts[0].y+Math.sin(a)*rr}); }
    paths.push({pts, closed:true});
  } else if(tool === 'line'){
    paths.push({pts:[...curPts], closed:false});
  }
  curPts = [];
  rebuildDrawLayers(); drawOverlay();
  $('hint').style.display = 'none';
});

function finishPen(closed){
  if(penPts.length > 1) paths.push({pts: smoothPath(penPts, 8), closed});
  penPts = []; rebuildDrawLayers(); drawOverlay();
  $('hint').style.display = 'none';
}
function smoothPath(pts, sub){
  if(pts.length < 3) return [...pts];
  const out = [];
  for(let i=0;i<pts.length-1;i++){
    const p0 = pts[Math.max(0,i-1)], p1 = pts[i], p2 = pts[i+1], p3 = pts[Math.min(pts.length-1,i+2)];
    for(let j=0;j<sub;j++){
      const t = j/sub, t2 = t*t, t3 = t2*t;
      out.push({
        x: 0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
        y: 0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
      });
    }
  }
  out.push(pts[pts.length-1]);
  return out;
}
function simplify(pts, eps){
  if(pts.length < 3) return pts;
  const out = [pts[0]];
  for(let i=1;i<pts.length-1;i++){
    const last = out[out.length-1];
    if(Math.hypot(pts[i].x-last.x, pts[i].y-last.y) > eps*2) out.push(pts[i]);
  }
  out.push(pts[pts.length-1]);
  return out;
}

/* ---------- overlay rendering ---------- */
function drawOverlay(penCursor){
  const r = viewport.getBoundingClientRect();
  if(overlay.width !== r.width*devicePixelRatio|0){ overlay.width = r.width*devicePixelRatio; overlay.height = r.height*devicePixelRatio; }
  octx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  octx.clearRect(0,0,overlay.width,overlay.height);
  if(MODE3D) return;
  const sc = p => { const s = toScreen(p); return {x: s.x/devicePixelRatio, y: s.y/devicePixelRatio}; };
  octx.lineWidth = 1.5;
  for(const path of paths){
    octx.strokeStyle = 'rgba(58,160,255,0.55)';
    octx.beginPath();
    path.pts.forEach((p,i) => { const s = sc(p); i ? octx.lineTo(s.x,s.y) : octx.moveTo(s.x,s.y); });
    if(path.closed) octx.closePath();
    octx.stroke();
    if(tool === 'edit'){
      octx.fillStyle = '#3aa0ff';
      path.pts.forEach(p => { const s = sc(p); octx.fillRect(s.x-2.5, s.y-2.5, 5, 5); });
    }
  }
  if(curPts.length){
    octx.strokeStyle = 'rgba(255,122,24,0.9)';
    octx.beginPath();
    if(tool === 'circle'){
      const c = sc(curPts[0]), e = sc(curPts[1]);
      octx.arc(c.x, c.y, Math.hypot(e.x-c.x, e.y-c.y), 0, Math.PI*2);
    } else {
      curPts.forEach((p,i) => { const s = sc(p); i ? octx.lineTo(s.x,s.y) : octx.moveTo(s.x,s.y); });
    }
    octx.stroke();
  }
  if(penPts.length){
    octx.strokeStyle = 'rgba(255,122,24,0.9)';
    octx.beginPath();
    penPts.forEach((p,i) => { const s = sc(p); i ? octx.lineTo(s.x,s.y) : octx.moveTo(s.x,s.y); });
    if(penCursor){ const s = sc(penCursor); octx.lineTo(s.x, s.y); }
    octx.stroke();
    octx.fillStyle = '#ff7a18';
    penPts.forEach(p => { const s = sc(p); octx.beginPath(); octx.arc(s.x, s.y, 3.5, 0, Math.PI*2); octx.fill(); });
  }
}

let selStop = 0;
function buildGradUI(){
  const wrap = document.createElement('div');
  wrap.innerHTML = `<div class="row" style="margin-bottom:2px"><label>Color over life</label>
    <span class="val" style="flex:1;text-align:right;color:var(--dim);font-size:10px">click bar = add · dbl-click stop = remove</span></div>
    <canvas id="gradbar" width="260" height="26"></canvas><div id="gradstops"></div>
    <div class="row"><label>Stop color</label><input type="color" id="stopcolor" style="flex:1;height:24px;border:none;background:none;cursor:pointer">
    <span class="val">HDR×</span></div>
    <div class="row"><label>Intensity</label><input type="range" id="stopint" min="0" max="6" step="0.05"><span class="val" id="stopintval"></span></div>`;
  setTimeout(() => {
    $('gradbar').onclick = e => {
      const r = $('gradbar').getBoundingClientRect();
      const t = (e.clientX - r.left)/r.width;
      const c = sampleGrad(t);
      L().grad.push({t, c: c.rgb, i: c.i});
      selStop = L().grad.length - 1;
      updateGradTex(L());
    };
    $('stopcolor').oninput = e => {
      const h = e.target.value;
      L().grad[selStop].c = [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
      updateGradTex(L());
    };
    $('stopint').oninput = e => { L().grad[selStop].i = +e.target.value; $('stopintval').textContent = (+e.target.value).toFixed(2); updateGradTex(L()); };
  });
  return wrap;
}
function sampleGrad(t){
  const stops = [...L().grad].sort((a,b)=>a.t-b.t);
  for(let i=0;i<stops.length-1;i++){
    if(t >= stops[i].t && t <= stops[i+1].t){
      const f = (t-stops[i].t)/Math.max(1e-5, stops[i+1].t-stops[i].t);
      return {rgb: stops[i].c.map((c,k)=>c*(1-f)+stops[i+1].c[k]*f), i: stops[i].i*(1-f)+stops[i+1].i*f};
    }
  }
  return {rgb: [...stops[0].c], i: stops[0].i};
}
function drawGradBar(){
  const cv = $('gradbar'); if(!cv) return;
  const c2 = cv.getContext('2d');
  const w = cv.width;
  for(let x=0;x<w;x++){
    const s = sampleGrad(x/(w-1));
    const m = Math.min(1.5, s.i);
    c2.fillStyle = `rgb(${Math.min(255,s.rgb[0]*m*170)|0},${Math.min(255,s.rgb[1]*m*170)|0},${Math.min(255,s.rgb[2]*m*170)|0})`;
    c2.fillRect(x, 0, 1, cv.height);
  }
  const stopsDiv = $('gradstops'); if(!stopsDiv) return;
  stopsDiv.innerHTML = '';
  L().grad.forEach((s, i) => {
    const d = document.createElement('div');
    d.className = 'stop' + (i === selStop ? ' sel' : '');
    d.style.left = (s.t*100) + '%';
    d.style.background = `rgb(${s.c[0]*255|0},${s.c[1]*255|0},${s.c[2]*255|0})`;
    d.onpointerdown = ev => {
      selStop = i; syncStopUI();
      const move = mv => {
        const r = stopsDiv.getBoundingClientRect();
        s.t = Math.max(0, Math.min(1, (mv.clientX - r.left)/r.width));
        updateGradTex(L());
      };
      const up = () => { window.removeEventListener('pointermove', move); window.removeEventListener('pointerup', up); };
      window.addEventListener('pointermove', move); window.addEventListener('pointerup', up);
      ev.stopPropagation();
    };
    d.ondblclick = () => { if(L().grad.length > 2){ L().grad.splice(i,1); selStop = 0; updateGradTex(L()); } };
    stopsDiv.appendChild(d);
  });
  syncStopUI();
}
function syncStopUI(){
  const s = L().grad[Math.min(selStop, L().grad.length-1)];
  if(!s) return;
  const hex = '#' + s.c.map(c => (Math.min(255, c*255)|0).toString(16).padStart(2,'0')).join('');
  if($('stopcolor')) $('stopcolor').value = hex;
  if($('stopint')){ $('stopint').value = s.i; $('stopintval').textContent = s.i.toFixed(2); }
}

function presetShape(kind){
  if(kind === 'ring'){
    const pts = []; for(let i=0;i<56;i++){ const a=i/56*Math.PI*2; pts.push({x:Math.cos(a)*0.5, y:Math.sin(a)*0.5}); }
    return [{pts, closed:true}];
  }
  if(kind === 'slash'){
    const pts = []; for(let i=0;i<=30;i++){ const t=i/30; pts.push({x:-0.7+1.4*t, y:Math.sin(t*Math.PI)*0.35-0.1}); }
    return [{pts, closed:false}];
  }
  if(kind === 'line'){
    const pts = []; for(let i=0;i<=30;i++){ const t=i/30; pts.push({x:-0.75+1.5*t, y:0}); }
    return [{pts, closed:false}];
  }
  return [];
}
function applyPreset(name){
  const pr = PRESETS[name];
  if(!pr) return;
  while(layers.length) deleteLayerSilent(0);
  Object.assign(G, JSON.parse(JSON.stringify(G_DEF)), JSON.parse(JSON.stringify(pr.post || {})));
  if(pr.shape && !paths.length) paths = presetShape(pr.shape);
  for(const lp of pr.layers) addLayer(JSON.parse(JSON.stringify(lp)), false);
  activeLayer = 0;
  refreshSliders(); renderLayerList(); drawOverlay();
  document.querySelectorAll('.preset').forEach(el => el.classList.toggle('active', el.textContent === name));
}
function deleteLayerSilent(i){
  const l = layers[i];

}

$('luckybtn').onclick = () => {
  const names = Object.keys(PRESETS);
  applyPreset(names[Math.floor(Math.random()*names.length)]);
  const r = (a,b) => a + Math.random()*(b-a);
  const rot = Math.random() < 0.55 ? Math.random()*6.28 : 0;
  for(const l of layers){
    l.seed = r(0, 100);
    l.curlStr *= r(0.7, 1.45); l.curlScale *= r(0.75, 1.4);
    l.turbStr *= r(0.7, 1.5); l.speed *= r(0.8, 1.3);
    l.vortex += r(-0.5, 0.5); l.flow *= r(0.8, 1.4); l.size *= r(0.85, 1.25);
    if(rot){
      l.grad.forEach(s => {
        const [x,y,z] = s.c, c = Math.cos(rot), sn = Math.sin(rot), k = 1/3, m = (1-c)*k;
        s.c = [
          Math.max(0, x*(c+m) + y*(m-sn*0.577) + z*(m+sn*0.577)),
          Math.max(0, x*(m+sn*0.577) + y*(c+m) + z*(m-sn*0.577)),
          Math.max(0, x*(m-sn*0.577) + y*(m+sn*0.577) + z*(c+m)),
        ];
      });
    }
    rebuildLayer(l);
  }
  G.bloomInt *= r(0.85, 1.25);
  refreshSliders();
};

  const r = scrub.getBoundingClientRect();

  sctx.clearRect(0,0,scrub.width,30);
  sctx.fillStyle = '#181b24'; sctx.fillRect(0, 11, scrub.width, 8);
  sctx.fillStyle = '#232733';
  const frames = Math.round(T.dur*T.fps);
  for(let f=0;f<=frames;f+=Math.max(1, Math.round(frames/40))){

}

/* deterministic offscreen frame renderer */
let readTarget = null;
function ensureReadTarget(w, h){
  if(readTarget && readTarget.w === w && readTarget.h === h) return;
  if(readTarget){ gl.deleteTexture(readTarget.tex); gl.deleteFramebuffer(readTarget.fbo); }
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texStorage2D(gl.TEXTURE_2D, 1, gl.RGBA8, w, h);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  readTarget = {tex, fbo, w, h};
}
function renderFramePixels(time, w, h, straightAlpha){
  ensureReadTarget(w, h);
  renderFrame(time, readTarget.fbo, w, h, true);
  const px = new Uint8Array(w*h*4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, readTarget.fbo);
  gl.readPixels(0, 0, w, h, gl.RGBA, gl.UNSIGNED_BYTE, px);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  /* flip Y + optional unpremultiply */
  const out = new Uint8ClampedArray(w*h*4);
  for(let y=0;y<h;y++){
    const src = (h-1-y)*w*4, dst = y*w*4;
    out.set(px.subarray(src, src+w*4), dst);
  }
  if(straightAlpha){
    for(let i=0;i<out.length;i+=4){
      const a = out[i+3];
      if(a > 0 && a < 255){ const k = 255/a;
        out[i] = Math.min(255, out[i]*k); out[i+1] = Math.min(255, out[i+1]*k); out[i+2] = Math.min(255, out[i+2]*k); }
    }
  }
  return new ImageData(out, w, h);
}
function frameCanvas(img){
  const cv = document.createElement('canvas');
  cv.width = img.width; cv.height = img.height;
  cv.getContext('2d').putImageData(img, 0, 0);
  return cv;
}
const sleep0 = () => new Promise(r => setTimeout(r));

async function doExport(){
  if(exporting) return;
  exporting = true;
  const wasPlaying = T.playing; T.playing = false;
  const fmt = $('exfmt').value;
  const {w, h} = exportRes();
  const fps = T.fps;
  const frames = Math.max(1, Math.round(T.dur*fps));
  const prevRT = {w: RT.w, h: RT.h};
  try{
    buildTargets(w, h);
    if(fmt === 'still'){
      const img = renderFramePixels(T.t % T.dur, w, h, true);
      const blob = await new Promise(r => frameCanvas(img).toBlob(r, 'image/png'));
      downloadBlob(blob, 'emberforge_frame.png');
      endProg('PNG saved ✓');
    }
    else if(fmt === 'png'){
      setProg(0, 'Loading zip encoder…');
      const fflate = await import('https://cdn.jsdelivr.net/npm/fflate@0.8.2/+esm');
      const files = {};
      for(let f=0;f<frames;f++){
        const img = renderFramePixels(f/fps, w, h, true);
        const blob = await new Promise(r => frameCanvas(img).toBlob(r, 'image/png'));
        files['frame_' + String(f).padStart(4,'0') + '.png'] = [new Uint8Array(await blob.arrayBuffer()), {level: 0}];
        setProg((f+1)/frames, `Rendering frame ${f+1}/${frames} @ ${w}×${h}`);
        await sleep0();
      }
      setProg(1, 'Zipping…');
      const zipped = fflate.zipSync(files);
      downloadBlob(new Blob([zipped], {type:'application/zip'}), `emberforge_${w}x${h}_${fps}fps.zip`);
      endProg(`${frames} PNG frames (straight alpha) ✓ — drop the sequence into After Effects`);
    }
    else if(fmt === 'webm'){
      if(!('VideoEncoder' in window)) throw new Error('WebCodecs not available — use Chrome/Edge');
      setProg(0, 'Loading WebM muxer…');
      const WM = await import('https://cdn.jsdelivr.net/npm/webm-muxer/+esm');
      let alphaOK = true;
      let cfg = {codec: 'vp09.00.10.08', width: w, height: h, framerate: fps, bitrate: 14_000_000, alpha: 'keep'};
      let support = await VideoEncoder.isConfigSupported(cfg).catch(() => ({supported:false}));
      if(!support.supported){ alphaOK = false; cfg = {codec:'vp8', width:w, height:h, framerate:fps, bitrate:12_000_000}; }
      const muxer = new WM.Muxer({
        target: new WM.ArrayBufferTarget(),
        video: {codec: alphaOK ? 'V_VP9' : 'V_VP8', width: w, height: h, frameRate: fps, alpha: alphaOK},
        firstTimestampBehavior: 'offset'
      });
      const enc = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => console.error(e)
      });
      enc.configure(cfg);
      for(let f=0;f<frames;f++){
        const img = renderFramePixels(f/fps, w, h, true);
        const vf = new VideoFrame(frameCanvas(img), {timestamp: f*1e6/fps, duration: 1e6/fps, alpha: 'keep'});
        enc.encode(vf, {keyFrame: f % (fps*2) === 0});
        vf.close();
        setProg((f+1)/frames, `Encoding frame ${f+1}/${frames}` + (alphaOK ? ' (with alpha)' : ' (alpha unsupported → opaque)'));
        if(enc.encodeQueueSize > 4) await enc.flush();
        await sleep0();
      }
      await enc.flush(); enc.close();
      muxer.finalize();
      downloadBlob(new Blob([muxer.target.buffer], {type:'video/webm'}), `emberforge_${w}x${h}.webm`);
      endProg(alphaOK ? 'Transparent WebM saved ✓' : 'WebM saved (no alpha on this browser — use PNG seq for alpha)');
    }
    else if(fmt === 'mp4'){
      if(!('VideoEncoder' in window)) throw new Error('WebCodecs not available — use Chrome/Edge');
      setProg(0, 'Loading MP4 muxer…');
      const MP = await import('https://cdn.jsdelivr.net/npm/mp4-muxer/+esm');
      const evenW = w & ~1, evenH = h & ~1;
      const muxer = new MP.Muxer({
        target: new MP.ArrayBufferTarget(),
        video: {codec: 'avc', width: evenW, height: evenH, frameRate: fps},
        fastStart: 'in-memory'
      });
      const enc = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => console.error(e)
      });
      enc.configure({codec: 'avc1.640028', width: evenW, height: evenH, framerate: fps, bitrate: 16_000_000});
      const cv = document.createElement('canvas'); cv.width = evenW; cv.height = evenH;
      const c2 = cv.getContext('2d');
      for(let f=0;f<frames;f++){
        const img = renderFramePixels(f/fps, w, h, false);
        c2.fillStyle = '#000'; c2.fillRect(0,0,evenW,evenH);
        c2.drawImage(frameCanvas(img), 0, 0);
        const vf = new VideoFrame(cv, {timestamp: f*1e6/fps, duration: 1e6/fps});
        enc.encode(vf, {keyFrame: f % (fps*2) === 0});
        vf.close();
        setProg((f+1)/frames, `Encoding frame ${f+1}/${frames}`);
        if(enc.encodeQueueSize > 4) await enc.flush();
        await sleep0();
      }
      await enc.flush(); enc.close();
      muxer.finalize();
      downloadBlob(new Blob([muxer.target.buffer], {type:'video/mp4'}), `emberforge_${evenW}x${evenH}.mp4`);
      endProg('MP4 saved ✓');
    }
    else if(fmt === 'gif'){
      setProg(0, 'Loading GIF encoder…');
      const gifenc = await import('https://cdn.jsdelivr.net/npm/gifenc@1.0.3/+esm');
      const gw = Math.min(w, 640), gh = Math.round(h*gw/w);
      const gifFps = Math.min(fps, 30);
      const gframes = Math.max(1, Math.round(T.dur*gifFps));
      const enc = gifenc.GIFEncoder();
      const cv = document.createElement('canvas'); cv.width = gw; cv.height = gh;
      const c2 = cv.getContext('2d');
      for(let f=0;f<gframes;f++){
        const img = renderFramePixels(f/gifFps, w, h, false);
        c2.clearRect(0,0,gw,gh);
        c2.drawImage(frameCanvas(img), 0, 0, gw, gh);
        const data = c2.getImageData(0,0,gw,gh).data;
        const pal = gifenc.quantize(data, 256, {format: 'rgba4444'});
        const idx = gifenc.applyPalette(data, pal, 'rgba4444');
        enc.writeFrame(idx, gw, gh, {palette: pal, delay: 1000/gifFps, transparent: true});
        setProg((f+1)/gframes, `GIF frame ${f+1}/${gframes}`);
        await sleep0();
      }
      enc.finish();
      downloadBlob(new Blob([enc.bytes()], {type:'image/gif'}), 'emberforge.gif');
      endProg('GIF saved ✓');
    }
    else if(fmt === 'flip'){
      const grid = +$('flipgrid').value;
      const cells = grid*grid;
      const cellW = Math.min(512, w), cellH = Math.round(cellW*h/w);
      const sheet = document.createElement('canvas');
      sheet.width = cellW*grid; sheet.height = cellH*grid;
      const c2 = sheet.getContext('2d');
      for(let f=0;f<cells;f++){
        const img = renderFramePixels(f/cells*T.dur, w, h, true);
        c2.drawImage(frameCanvas(img), (f % grid)*cellW, Math.floor(f/grid)*cellH, cellW, cellH);
        setProg((f+1)/cells, `Flipbook cell ${f+1}/${cells}`);
        await sleep0();
      }
      setProg(1, 'Packing…');
      const fflate = await import('https://cdn.jsdelivr.net/npm/fflate@0.8.2/+esm');
      const pngBlob = await new Promise(r => sheet.toBlob(r, 'image/png'));
      const meta = {
        tool: 'EMBERFORGE', type: 'flipbook',
        grid: [grid, grid], frames: cells, fps: +(cells/T.dur).toFixed(3),
        cell: [cellW, cellH], sheet: [sheet.width, sheet.height],
        loop: true, alpha: 'straight', duration_s: T.dur
      };
      const notes = flipbookNotes(grid, cells, T.dur);
      const files = {
        'flipbook.png': [new Uint8Array(await pngBlob.arrayBuffer()), {level: 0}],
        'flipbook.json': fflate.strToU8(JSON.stringify(meta, null, 2)),
        'SETUP_Unity_Roblox.txt': fflate.strToU8(notes),
        'RobloxFlipbook.lua': fflate.strToU8(robloxLua(grid, cells, T.dur)),
      };
      downloadBlob(new Blob([fflate.zipSync(files)], {type:'application/zip'}), `emberforge_flipbook_${grid}x${grid}.zip`);
      endProg(`Flipbook ${grid}×${grid} ✓ — Unity & Roblox ready`);
    }
  }catch(err){
    console.error(err);
    endProg('⚠ Export failed: ' + err.message);
  }finally{
    buildTargets(prevRT.w, prevRT.h);
    T.playing = wasPlaying;
    exporting = false;
  }
}
function flipbookNotes(grid, cells, dur){
  return `EMBERFORGE FLIPBOOK — SETUP NOTES
=====================================
Sheet: flipbook.png  |  Grid: ${grid} x ${grid}  |  Frames: ${cells}  |  Loop: ${dur}s (perfect loop)

UNITY (Built-in Particle System / Shuriken)
-------------------------------------------
1. Import flipbook.png. Texture Type: Default. Alpha Is Transparency: ON.
2. Create a Particle System. Renderer > Material: create a material with
   shader "Particles/Standard Unlit" (Rendering Mode: Additive or Fade),
   assign flipbook.png.
3. Enable "Texture Sheet Animation" module:
   - Mode: Grid,  Tiles X: ${grid},  Y: ${grid}
   - Time Mode: Lifetime,  Cycles: 1  (or FPS = ${(cells/dur).toFixed(1)})
4. For a single looping billboard instead of particles: use a Quad +
   the same material, animate via script or Shader Graph "Flipbook" node
   (Width ${grid}, Height ${grid}).

UNITY (VFX Graph)
-----------------
Set the output's "Flipbook Layout" to Texture2D, Flip Book Size = (${grid},${grid}),
sample with Texture Index = age/lifetime * ${cells}.

ROBLOX
------
1. Upload flipbook.png as an Image asset (Decal). Get the asset id.
2. Use the included RobloxFlipbook.lua on an ImageLabel — it animates
   ImageRectOffset/ImageRectSize over the ${grid}x${grid} grid at ${(cells/dur).toFixed(1)} fps.
3. Or in newer Roblox: ParticleEmitter > FlipbookLayout = Grid${grid}x${grid},
   FlipbookMode = Loop, FlipbookFramerate = ${(cells/dur).toFixed(1)}.

UNREAL
------
Material > Particle SubUV node, SubImages X=${grid} Y=${grid}; in Niagara use
SubUV Animation module with ${cells} frames.

The loop is mathematically perfect: frame ${cells} flows into frame 1 with zero pop.
Made with EMBERFORGE.`;
}
function robloxLua(grid, cells, dur){
  return `-- EMBERFORGE flipbook player (Roblox)
-- Put this Script inside an ImageLabel whose Image = your uploaded flipbook.png
local label = script.Parent
local GRID = ${grid}
local FRAMES = ${cells}
local FPS = ${(cells/dur).toFixed(3)}
local cellW, cellH -- set after image loads; sheet is square cells grid
label.ScaleType = Enum.ScaleType.Stretch
local RunService = game:GetService("RunService")
local t0 = os.clock()
RunService.RenderStepped:Connect(function()
  local sheet = label.ImageRectSize -- assumes you set ImageRectSize once below
  local frame = math.floor(((os.clock() - t0) * FPS)) % FRAMES
  local x = frame % GRID
  local y = math.floor(frame / GRID)
  label.ImageRectOffset = Vector2.new(x * label.ImageRectSize.X, y * label.ImageRectSize.Y)
end)
-- IMPORTANT: set label.ImageRectSize = Vector2.new(sheetWidth/GRID, sheetHeight/GRID) once,
-- e.g. for a 4096px sheet with ${grid}x${grid} grid: Vector2.new(${Math.floor(4096/grid)}, ${Math.floor(4096/grid)})
`;
}
/* ============================ MAIN LOOP ============================ */
paths = [];
applyPreset('🔥 Fire');

let fpsAvg = 60, lastSeamCheck = 0;
function resize(){
  const r = viewport.getBoundingClientRect();
  const dpr = Math.min(devicePixelRatio, 1.75);
  const w = Math.max(2, r.width*dpr|0), h = Math.max(2, r.height*dpr|0);
  if(glcanvas.width !== w || glcanvas.height !== h){
    glcanvas.width = w; glcanvas.height = h;
    buildTargets(w, h);
    drawOverlay();
  }
}
window.addEventListener('resize', resize);
resize();

function seamCheck(now){
  if(!$('seamchk').checked || now - lastSeamCheck < 800 || exporting) return;
  lastSeamCheck = now;
  const sw = 180, sh = 120;
  const prevW = RT.w, prevH = RT.h;
  buildTargets(sw, sh);
  const a = renderFramePixels(0, sw, sh, false);
  const b = renderFramePixels(T.dur - 1/T.fps, sw, sh, false);
  buildTargets(prevW, prevH);
  const sv = $('seamview').getContext('2d');
  const diff = new ImageData(sw, sh);
  let maxd = 0;
  for(let i=0;i<a.data.length;i+=4){
    const d = (Math.abs(a.data[i]-b.data[i]) + Math.abs(a.data[i+1]-b.data[i+1]) + Math.abs(a.data[i+2]-b.data[i+2]))/3;
    maxd = Math.max(maxd, d);
    diff.data[i] = a.data[i]; diff.data[i+1] = a.data[i+1]; diff.data[i+2] = a.data[i+2];
    diff.data[i+3] = 255;
  }
  /* left half = frame 0, right half = last frame */
  for(let y=0;y<sh;y++) for(let x=sw>>1;x<sw;x++){
    const i = (y*sw+x)*4;
    diff.data[i] = b.data[i]; diff.data[i+1] = b.data[i+1]; diff.data[i+2] = b.data[i+2];
  }
  sv.putImageData(diff, 0, 0);
  sv.strokeStyle = '#ff7a18'; sv.beginPath(); sv.moveTo(sw/2, 0); sv.lineTo(sw/2, sh); sv.stroke();
  sv.fillStyle = '#fff'; sv.font = '9px sans-serif';
  sv.fillText('first', 4, 10); sv.fillText('last', sw-26, 10);
}

function frame(now){
  requestAnimationFrame(frame);
  if(exporting) return;
  const dt = Math.min(0.1, (now - T.last)/1000);
  T.last = now;
  if(T.playing){
    T.t += dt;
    if(T.loop && T.t >= T.dur) T.t -= T.dur;
  }
  resize();
  const time = T.loop ? (T.t % T.dur) : T.t;
  renderFrame(time, null, glcanvas.width, glcanvas.height, false);
  fpsAvg = fpsAvg*0.95 + (1/Math.max(dt, 1e-4))*0.05;
  let quads = 0;
  for(const l of layers){ if(!l.visible) continue; quads += (l.type === 'beam') ? l.spawnN : l.count * (l.trail ? Math.max(2, l.trail) : 1); }
  $('hud').innerHTML = `${fpsAvg.toFixed(0)} fps · ${layers.length} layer${layers.length>1?'s':''} · ${(quads/1000).toFixed(0)}k quads` +
    (MODE3D ? ' · 3D orbit' : '') + (T.loop ? ` · loop ${T.dur.toFixed(1)}s` : '');
  $('timecode').textContent = time.toFixed(3) + ' / ' + T.dur.toFixed(3);
  drawScrub();
  seamCheck(now);
}
requestAnimationFrame(frame);
</script>
